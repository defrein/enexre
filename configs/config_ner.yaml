task: ner
dataset: bc5cdr
checkpoint: microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext

splits:
  train: train
  development: dev
  test: test

labels:
  - O
  - B-Chemical
  - I-Chemical
  - B-Disease
  - I-Disease

training:
  random_seeds: [13, 42, 100]
  learning_rates: [1.0e-5, 3.0e-5, 5.0e-5]
  batch_sizes: [8, 16]
  max_epochs: 10
  early_stopping_patience: 2
  max_sequence_length: 512
  weight_decay: 0.01
  dropout: 0.1
  selection_metric: entity_level_f1

outputs:
  checkpoints_dir: checkpoints/ner
  predictions_dir: predictions/ner
  results_dir: results/ner
  logs_dir: logs/ner

